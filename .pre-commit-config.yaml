minimum_pre_commit_version: "3.5.0"
default_install_hook_types: [pre-commit, pre-push]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict
      - id: check-added-large-files

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.0
    hooks:
      - id: gitleaks
        stages: [pre-commit, pre-push]

  - repo: local
    hooks:
      - id: ruff
        name: ruff check
        entry: uv run --frozen ruff check
        language: system
        types: [python]
      - id: flake8
        name: flake8
        entry: uv run --frozen flake8 app.py exam_hub_adk scripts tests
        language: system
        pass_filenames: false
      - id: pylint
        name: pylint
        entry: uv run --frozen pylint app.py exam_hub_adk scripts tests
        language: system
        pass_filenames: false
        stages: [pre-push]
      - id: vulture
        name: vulture
        entry: uv run --frozen vulture
        language: system
        pass_filenames: false
        stages: [pre-push]
      - id: ruff-format
        name: ruff format
        entry: uv run --frozen ruff format --check
        language: system
        types: [python]
      - id: pyupgrade
        name: pyupgrade
        entry: uv run --frozen pyupgrade --py312-plus
        language: system
        types: [python]
      - id: ty
        name: ty
        entry: uv run --frozen ty check app.py exam_hub_adk tests scripts
        language: system
        pass_filenames: false
        stages: [pre-push]
      - id: mypy
        name: mypy
        entry: uv run --frozen mypy app.py exam_hub_adk tests scripts
        language: system
        pass_filenames: false
        stages: [pre-push]
      - id: semgrep
        name: semgrep
        entry: uvx --from semgrep==1.165.0 semgrep --config p/python --error
        language: system
        types: [python]
        stages: [pre-push]
      - id: bandit
        name: bandit
        entry: uv run --frozen bandit -c pyproject.toml -r app.py exam_hub_adk scripts
        language: system
        pass_filenames: false
        stages: [pre-push]
      - id: pytest
        name: pytest
        entry: uv run --frozen python scripts/run_pytest.py
        language: system
        pass_filenames: false
        stages: [pre-push]
      - id: compliance-docs
        name: compliance docs
        entry: uv run --frozen python scripts/check_compliance.py
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: pip-audit
        name: pip-audit
        entry: uv run --frozen pip-audit
        language: system
        pass_filenames: false
        stages: [pre-push]
