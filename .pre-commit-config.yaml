repos:
  - repo: local
    hooks:
      - id: eslint
        name: eslint
        entry: npx eslint .
        language: system
        pass_filenames: false

      - id: prettier
        name: prettier
        entry: npx prettier --check .
        language: system
        pass_filenames: false

      - id: gitleaks
        name: gitleaks
        entry: gitleaks detect
        language: system
        pass_filenames: false
              - id: typescript
        name: typescript
        entry: npx tsc --noEmit
        language: system
        pass_filenames: false