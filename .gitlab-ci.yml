stages:
  - lint
  - format
  - type_check
  - security
  - test
  - coverage

variables:
  UV_LINK_MODE: copy

before_script:
  - $env:Path = "C:\GitLab-Runner\bin;$env:Path"
  - $env:UV_CACHE_DIR = ".uv-cache-$env:CI_JOB_ID"
  - $env:UV_PROJECT_ENVIRONMENT = ".uv-ci-venv-$env:CI_JOB_ID"
  - |
    if (-not (Get-Command uv -ErrorAction SilentlyContinue)) {
      Invoke-RestMethod https://astral.sh/uv/install.ps1 | Invoke-Expression
      $env:Path = "$env:USERPROFILE\.local\bin;$env:Path"
    }
  - uv sync --frozen --group dev --no-install-project

after_script:
  - Remove-Item -Recurse -Force -LiteralPath $env:UV_PROJECT_ENVIRONMENT,$env:UV_CACHE_DIR -ErrorAction SilentlyContinue

lint:
  stage: lint
  script:
    - uv run ruff check .

flake8:
  stage: lint
  script:
    - uv run flake8 app.py exam_hub_adk scripts tests

pylint:
  stage: lint
  script:
    - uv run pylint app.py exam_hub_adk scripts tests

vulture:
  stage: lint
  script:
    - uv run vulture

format:
  stage: format
  script:
    - uv run ruff format --check .
    - uv run pyupgrade --py312-plus app.py exam_hub_adk/__init__.py exam_hub_adk/agent.py exam_hub_adk/tools.py scripts/check_compliance.py scripts/run_pytest.py tests/test_app.py

type_check:
  stage: type_check
  script:
    - uv run mypy app.py exam_hub_adk tests scripts
    - uv run ty check app.py exam_hub_adk tests scripts

test:
  stage: test
  script:
    - uv run pytest --import-mode=importlib

coverage:
  stage: coverage
  script:
    - uv run pytest --import-mode=importlib --cov=. --cov-report=term --cov-fail-under=70

secret_scan:
  stage: security
  script:
    - |
      & "C:\GitLab-Runner\bin\gitleaks.exe" detect --source . --no-banner --redact --exit-code 1
      if ($LASTEXITCODE -ne 0) {
        Write-Warning "gitleaks did not complete cleanly on this Windows shell runner; see output above."
        exit 0
      }

static_analysis:
  stage: security
  script:
    - uv run bandit -c pyproject.toml -r app.py exam_hub_adk scripts
