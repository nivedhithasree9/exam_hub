stages:
  - quality
  - format
  - type_check
  - security
  - test
  - coverage

variables:
  UV_CACHE_DIR: .uv-cache
  UV_LINK_MODE: copy
  UV_PROJECT_ENVIRONMENT: .uv-ci-venv

cache:
  key:
    files:
      - uv.lock
  paths:
    - .uv-cache/

before_script:
  - $env:Path = "C:\GitLab-Runner\bin;$env:Path"
  - |
    if (-not (Get-Command uv -ErrorAction SilentlyContinue)) {
      Invoke-RestMethod https://astral.sh/uv/install.ps1 | Invoke-Expression
      $env:Path = "$env:USERPROFILE\.local\bin;$env:Path"
    }
  - uv sync --frozen --group dev --no-install-project

quality:
  stage: quality
  script:
    - uv run ruff check .

format:
  stage: format
  script:
    - uv run ruff format --check .

type_check:
  stage: type_check
  script:
    - uv run ty check app.py exam_hub_adk tests scripts

test:
  stage: test
  script:
    - uv run pytest --import-mode=importlib

coverage:
  stage: coverage
  script:
    - uv run pytest --import-mode=importlib --cov=. --cov-report=term --cov-fail-under=70

dependency_audit:
  stage: security
  script:
    - uv run pip-audit

semgrep:
  stage: security
  allow_failure: true
  script:
    - uvx --from semgrep==1.165.0 semgrep --config p/python --error .

secret_scan:
  stage: security
  script:
    - uv run pre-commit run gitleaks --all-files
