image: ghcr.io/astral-sh/uv:python3.12-bookworm

stages:
  - quality
  - format
  - type_check
  - security
  - test
  - coverage

variables:
  UV_CACHE_DIR: .uv-cache
  UV_LINK_MODE: copy

cache:
  key:
    files:
      - uv.lock
  paths:
    - .uv-cache/

before_script:
  - uv sync --frozen --group dev --no-install-project

quality:
  stage: quality
  script:
    - uv run ruff check .

format:
  stage: format
  script:
    - uv run ruff format --check .

type_check:
  stage: type_check
  script:
    - uv run ty check app.py exam_hub_adk tests scripts

test:
  stage: test
  script:
    - uv run pytest --import-mode=importlib

coverage:
  stage: coverage
  script:
    - uv run pytest --import-mode=importlib --cov=. --cov-report=term --cov-fail-under=70

dependency_audit:
  stage: security
  script:
    - uv run pip-audit

semgrep:
  stage: security
  script:
    - uvx --from semgrep==1.165.0 semgrep --config p/python --error .

secret_scan:
  stage: security
  script:
    - curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh | sh
    - chmod +x ./bin/trufflehog
    - ./bin/trufflehog filesystem .
