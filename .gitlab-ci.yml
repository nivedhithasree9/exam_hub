stages:
  - lint
  - format
  - type_check
  - test
  - security
  - coverage

lint:
  stage: lint
  image: node:20
  script:
    - npm install
    - npx eslint .

format:
  stage: format
  image: node:20
  script:
    - npm install
    - npx prettier --check .

type_check:
  stage: type_check
  image: node:20
  script:
    - npm install
    - npx tsc --noEmit

test:
  stage: test
  image: node:20
  script:
    - npm install
    - npm test

coverage:
  stage: coverage
  image: node:20
  script:
    - npm install
    - npm run coverage
    security:
  stage: security
  image: node:20
  script:
    - npm install
    - npm audit