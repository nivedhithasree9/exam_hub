image: python:3.12

stages:
  - lint
  - format
  - type_check
  - security
  - test
  - coverage

before_script:
  - pip install -r requirements.txt
  - pip install -r requirements-dev.txt

lint:
  stage: lint
  script:
    - ruff check .
    - flake8 .
    - pylint app.py
    - vulture --min-confidence 100 .
    - pyupgrade --py312-plus app.py

format:
  stage: format
  script:
    - ruff format --check .

type_check:
  stage: type_check
  script:
    - mypy .

test:
  stage: test
  script:
    - pytest

coverage:
  stage: coverage
  script:
    - pytest --cov=. --cov-report=term --cov-fail-under=70

dependency_audit:
  stage: security
  script:
    - pip-audit -r requirements.txt

semgrep:
  stage: security
  script:
    - semgrep --config p/python --error .

secret_scan:
  stage: security
  script:
    - pip install trufflehog
    - trufflehog filesystem .
